# docker-compose.yml
services:

  # ─── PostgreSQL Database ───────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sync_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sync_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Mailpit (dev email server) ─────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: sync_mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  # ─── Django Web Server ──────────────────────────────
  web:
    build: .
    container_name: sync_web
    restart: unless-stopped
    env_file: .env
    working_dir: /app/sync
    # CRITICAL: Add /app to PYTHONPATH so 'apps' module is findable
    environment:
      - PYTHONPATH=/app:/app/sync
      - DJANGO_SETTINGS_MODULE=core.settings
    command: >
      sh -c 'python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application'
    volumes:
      - .:/app
      - static_volume:/app/sync/staticfiles
      - media_volume:/app/sync/media
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

# ─── Named Volumes ──────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume: